name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - name: Set up google-services.json
        working-directory: flutter_app/android/app
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
            echo "Using real google-services.json from secret"
          else
            cat > google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ai-friend-placeholder",
              "storage_bucket": "ai-friend-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.aifriend.ai_friend" }
                },
                "api_key": [{ "current_key": "placeholder" }],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          GSEOF
            echo "Using placeholder google-services.json (FCM disabled)"
          fi

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-friend-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Send APK to Telegram
        run: |
          curl -F document=@flutter_app/build/app/outputs/flutter-apk/app-release.apk \
               -F caption="AI Friend v1.0 — Build #${{ github.run_number }} (${{ github.sha }})" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}
